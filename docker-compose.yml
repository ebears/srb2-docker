services:
  srb2:
    image: ${SRB2_IMAGE:-ghcr.io/ebears/srb2-docker:latest}
    # To build from source instead, set SRB2_IMAGE="" and uncomment:
    # build:
    #   context: .
    #   args:
    #     SRB2_VERSION: ${SRB2_VERSION:-auto}
    container_name: srb2
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "5029:5029/udp"
    volumes:
      - "./mods:/mods"        # Drop mod files here (.wad, .pk3, etc.)
      - "./data:/data"        # Server data and config (adedserv.cfg)
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "2.0"
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    # command: ["-maxplayers", "16"]
